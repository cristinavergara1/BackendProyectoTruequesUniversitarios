name: Build & Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: |
          chmod +x mvnw
          ./mvnw -DskipTests package

      - name: Run unit tests
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Build Docker image
        run: docker build -t trueques-backend:ci .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on direct pushes to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Triggering Render deployment..."
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy hook triggered."
          else
            echo "RENDER_DEPLOY_HOOK secret not configured."
            echo "Either add it in GitHub repo Settings -> Secrets and variables -> Actions,"
            echo "or rely on Render's auto-deploy-on-push if enabled."
          fi
