# Render expone el puerto en la variable de entorno PORT
server.port=${PORT:8080}

# Render Postgres suele exponer la URL completa en DATABASE_URL (formato: postgres://user:pass@host:port/db)
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:}}
spring.datasource.username=${DB_USERNAME:${DATABASE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD:}}

# Si usas DATABASE_URL, conviene setear JDBC_DATABASE_URL en Render como JDBC (ver README) para evitar problemas.
# Alternativa: setear SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD.

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
